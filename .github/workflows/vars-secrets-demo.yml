name: Etapa 2 - Variaveis e Secrets

'on':
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  usar-variaveis:
    name: Usar variaveis do repositorio
    runs-on: ubuntu-latest
    steps:
      - name: Exibir variaveis nao sensiveis
        run: |
          echo "APP_MODE=${{ vars.APP_MODE }}"
          echo "SUPPORT_EMAIL=${{ vars.SUPPORT_EMAIL }}"

      - name: Aplicar comportamento com base no APP_MODE
        run: |
          if [ "${{ vars.APP_MODE }}" = "production" ]; then
            echo "Modo de producao ativado: validacoes extras habilitadas."
          else
            echo "Modo nao produtivo: pipeline em modo padrao."
          fi

      - name: Definir contato de suporte para o pipeline
        env:
          SUPPORT_EMAIL: ${{ vars.SUPPORT_EMAIL }}
        run: |
          echo "Canal de suporte configurado para: ${SUPPORT_EMAIL}"

  tarefa-sensivel:
    name: Tarefa sensivel com secret
    runs-on: ubuntu-latest
    steps:
      - name: Validar presenca do segredo
        if: ${{ secrets.PROD_TOKEN != '' }}
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
        run: |
          echo "Segredo recebido com sucesso."
          echo "Simulando autenticacao protegida..."
          if [ -n "${PROD_TOKEN}" ]; then
            echo "Autenticacao simulada concluida sem expor o valor do token."
          else
            echo "Token vazio."
            exit 1
          fi

      - name: Aviso quando segredo nao estiver configurado
        if: ${{ secrets.PROD_TOKEN == '' }}
        run: |
          echo "PROD_TOKEN nao configurado no repositorio."
          echo "Configure o segredo em Settings > Secrets and variables > Actions."
          exit 1
